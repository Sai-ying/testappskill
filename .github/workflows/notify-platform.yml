name: Notify platform on push
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare payload and sign
        env:
          WEBHOOK_SECRET: ${{ secrets.PLATFORM_WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(jq -nc --argjson hosting_id 152 --arg branch "${{ github.ref_name }}" --arg commit "${{ github.sha }}" --arg ref "${{ github.ref }}" '{"hosting_id":,"branch":,"commit":,"ref":}')
          SIG="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          echo "Payload: $PAYLOAD"
          echo "Signature: $SIG"
          curl -s -X POST https://www.vco2.be/webhook.php \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -H "X-GitHub-Event: push" \
            -d "$PAYLOAD"